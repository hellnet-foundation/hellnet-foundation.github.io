name: pages

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "src/**"
      - "static/**"
      - "package.json"
      - "docusaurus.config.js"
      - "sidebars.js"
      - "CNAME"
      - ".github/workflows/pages.yaml"
  repository_dispatch:
    types:
      - project-docs-updated
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout docs hub
        uses: actions/checkout@v5
        with:
          path: docs-hub

      - name: Checkout SOC AI Relay
        uses: actions/checkout@v5
        with:
          repository: hellnet-foundation/soc-ai-relay
          ref: main
          path: projects/soc-ai-relay

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Copy project documentation
        run: |
          rm -rf docs-hub/docs/soc-ai-relay
          mkdir -p docs-hub/docs/soc-ai-relay
          cp -R projects/soc-ai-relay/docs/. docs-hub/docs/soc-ai-relay/

      - name: Install dependencies
        working-directory: docs-hub
        run: npm install

      - name: Build Docusaurus site
        working-directory: docs-hub
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs-hub/build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs:
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
